---
name: Bug 报告
description: 报告一个 Bug 以帮助我们改进
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间填写这份 Bug 报告！
        
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 请清晰简洁地描述这个 Bug 是什么
      placeholder: 例如：当我点击按钮时，应用崩溃了
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 请提供详细的复现步骤
      placeholder: |
        1. 打开应用
        2. 点击 '...'
        3. 选择 '...'
        4. 看到错误
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
      placeholder: 例如：应该正常保存文件
    validations:
      required: true
      
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 例如：显示了错误提示 "无法保存"
    validations:
      required: true
      
  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，请添加截图
      placeholder: 可以直接粘贴图片到这里
      
  - type: input
    id: environment
    attributes:
      label: 环境信息
      description: 请提供您的环境信息
      placeholder: 例如：Windows 11, Chrome 120, Node.js 18.0.0
      
  - type: textarea
    id: logs
    attributes:
      label: 日志
      description: 如果适用，请粘贴相关的日志信息
      render: shell
      
  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已经搜索过现有的 issues，没有发现相同的问题
          required: true
