---
name: 功能建议
description: 为这个项目提出一个功能建议
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出功能建议！
        
  - type: textarea
    id: problem
    attributes:
      label: 您的功能建议是否与某个问题相关？
      description: 请清晰简洁地描述问题所在
      placeholder: 例如：我经常遇到 [...] 的问题
      
  - type: textarea
    id: solution
    attributes:
      label: 描述您想要的解决方案
      description: 请清晰简洁地描述您想要的功能
      placeholder: 例如：我希望可以 [...]
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: 描述您考虑过的替代方案
      description: 您是否考虑过其他实现方式？
      placeholder: 例如：或者可以 [...]
      
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 添加任何与功能请求相关的上下文或截图
      placeholder: 例如：使用场景、用户故事等
      
  - type: checkboxes
    id: terms
    attributes:
      label: 确认
      options:
        - label: 我已经搜索过现有的 issues，没有发现相同的功能建议
          required: true
